<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narada Travels — Прайс-лист</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:       #f5f3ef;
      --surface:  #ffffff;
      --border:   #e4e0d8;
      --border2:  #f0ece4;
      --accent:   #8b6914;
      --accent2:  #2a7a6f;
      --text:     #1a1917;
      --muted:    #7a756c;
      --green:    #2d6a3f;
      --purple:   #5a4a8a;
      --note-bg:  #fdf8ee;
      --radius:   10px;
      --shadow:   0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── HEADER ── */
    header {
      padding: 32px 20px 24px;
      text-align: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .brand {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--accent);
    }
    .tagline {
      font-size: 10.5px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── STATUS BAR ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .rate-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
    }
    .rate-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .rate-badge.live .dot { background: #3a9e50; animation: pulse 2s infinite; }
    .rate-badge.error .dot { background: #c0392b; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #last-updated { color: var(--muted); font-size: 10px; }

    /* ── CURRENCY CHIPS ── */
    #rates-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .cur-chip {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--muted);
      white-space: nowrap;
    }
    .cur-chip span { color: var(--accent); font-weight: 400; }

    /* ── MAIN ── */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px 12px 0;
    }

    /* ── COLUMN HEADERS ── */
    .col-headers {
      display: grid;
      grid-template-columns: 1.6fr 0.8fr 1fr 1.4fr 1fr;
      padding: 0 16px 6px;
      gap: 4px;
    }
    .col-headers div {
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
      text-align: right;
      color: var(--muted);
    }
    .col-headers div:first-child { text-align: left; }
    .col-h-usd  { color: var(--green) !important; }
    .col-h-rub  { color: var(--accent) !important; }
    .col-h-vnd  { color: var(--accent2) !important; }
    .col-h-usdt { color: var(--purple) !important; }

    /* ── TOUR CARD ── */
    .tour-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .tour-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border2);
      background: #fafaf8;
    }
    .tour-icon { font-size: 16px; flex-shrink: 0; line-height: 1; }
    .tour-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    /* ── PRICE ROW ── */
    .price-rows { padding: 6px 16px 10px; }

    .price-row {
      display: grid;
      grid-template-columns: 1.6fr 0.8fr 1fr 1.4fr 1fr;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border2);
      gap: 4px;
    }
    .price-row:last-child { border-bottom: none; }

    /* separator row between main prices and ticket prices */
    .price-row.separator {
      border-top: 1px dashed var(--border);
      margin-top: 2px;
    }

    .row-label {
      font-size: 11.5px;
      color: var(--muted);
    }
    .row-label.ticket-label {
      font-size: 10.5px;
      color: #aaa09a;
      font-style: italic;
    }

    .price-cell {
      font-family: 'DM Mono', monospace;
      font-size: 11.5px;
      text-align: right;
      white-space: nowrap;
    }
    .price-cell.usd  { color: var(--green); }
    .price-cell.rub  { color: var(--accent); }
    .price-cell.vnd  { color: var(--accent2); }
    .price-cell.usdt { color: var(--purple); }
    .price-cell.ticket { opacity: .75; font-size: 10.5px; }

    /* ticket section label */
    .ticket-section-label {
      padding: 6px 16px 2px;
      font-size: 9.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #bbb5ad;
      border-top: 1px dashed var(--border);
      font-family: 'DM Mono', monospace;
    }

    /* ── SKELETON ── */
    .skeleton {
      display: inline-block;
      width: 52px; height: 9px;
      background: linear-gradient(90deg, var(--border) 25%, #ede9e0 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 3px;
      vertical-align: middle;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 10px;
      color: #bbb5ad;
      letter-spacing: .05em;
    }
    footer a { color: #aaa09a; text-decoration: none; }
    footer a:hover { color: var(--muted); }


    /* ── CALCULATOR ── */
    .calc-toggle {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 12px;
      padding: 7px 0;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .calc-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .calc-block {
      display: none;
      padding: 10px 16px 14px;
      border-top: 1px dashed var(--border);
      background: #fafaf8;
    }
    .calc-block.open { display: block; }
    .calc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid var(--border2);
    }
    .calc-row:last-of-type { border-bottom: none; }
    .calc-label { font-size: 11px; color: var(--muted); }
    .calc-counter {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .calc-btn {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .calc-btn:hover { border-color: var(--accent); color: var(--accent); }
    .calc-num {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      min-width: 20px;
      text-align: center;
    }
    .calc-total {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }
    .calc-total-label { color: var(--muted); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
    .calc-total-usd  { color: var(--green); font-size: 15px; font-weight: 500; }
    .calc-total-rest { color: var(--muted); font-size: 10px; margin-top: 3px; }
    .calc-currencies {
      display: flex;
      gap: 12px;
      margin: 8px 0;
      flex-wrap: wrap;
    }
    .calc-currencies label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
    }
    .calc-currencies input { cursor: pointer; accent-color: var(--accent); }
    .calc-copy {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 7px 0;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
    }
    .calc-copy:hover { opacity: .85; }
    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .price-row,
      .col-headers { grid-template-columns: 1.4fr 0.8fr 1fr 1.4fr 0.9fr; }
      .price-cell  { font-size: 10.5px; }
      .tour-name   { font-size: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">Narada Travels</div>
  <div class="tagline">Прайс-лист экскурсий · Да Нанг</div>
</header>

<div id="status-bar">
  <div class="rate-badge" id="rate-status">
    <div class="dot"></div>
    <span id="status-text">Загрузка курсов…</span>
  </div>
  <div id="last-updated"></div>
</div>

<div id="rates-row">
  <div class="cur-chip">1 USD = <span id="chip-rub"><span class="skeleton"></span></span></div>
  <div class="cur-chip">1 USD = <span id="chip-vnd"><span class="skeleton"></span></span></div>
  <div class="cur-chip">1 USD = <span id="chip-usdt"><span class="skeleton"></span></span></div>
</div>

<main id="price-list"></main>

<footer>
  Курсы: <a href="https://www.exchangerate-api.com" target="_blank" rel="noopener">ExchangeRate-API</a>
  · обновление раз в сутки
</footer>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// КОНФИГУРАЦИЯ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MARKUP     = { RUB: 0.15,  VND: 0.03,   USDT: 0.00  };
const ROUND_STEP = { RUB: 100,   VND: 100000,  USDT: 1     };

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ПРАЙС-ЛИСТ
// row types:
//   'price'  — обычная строка, usd = базовая цена
//   'ticket' — входной билет, vnd_fixed = фиксированная цена в VND (пересчитывается в остальные)
//   'ticket_pct' — % от другого билета (ticketRef + pct)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TOURS = [
  {
    icon: '🏯', name: 'Хюэ',
    rows: [
      { type: 'price',  label: 'Взрослый',      usd: 85   },
      { type: 'price',  label: 'Ребёнок до 10', usd: 42.5 },
    ],
  },
  {
    icon: '🏮', name: 'Хойан',
    rows: [
      { type: 'price',  label: 'Взрослый',      usd: 58 },
      { type: 'price',  label: 'Ребёнок до 10', usd: 29 },
    ],
  },
  {
    icon: '🏝', name: 'Острова Чам',
    rows: [
      { type: 'price',  label: 'Взрослый',        usd: 60 },
      { type: 'price',  label: 'Ребёнок до 10',   usd: 30 },
      { type: 'price',  label: 'Морская рыбалка', usd: 90 },
    ],
  },
  {
    icon: '🌉', name: 'Обзорный Дананг',
    rows: [
      { type: 'price',  label: 'Взрослый',      usd: 67   },
      { type: 'price',  label: 'Ребёнок до 10', usd: 33.5 },
    ],
  },
  {
    icon: '⛰', name: 'Ба На Хиллс',
    rows: [
      { type: 'price',  label: 'Взрослый',      usd: 48 },
      { type: 'price',  label: 'Ребёнок до 10', usd: 24 },
    ],
    tickets: [
      { id: 'bana_adult',  label: 'Взрослые и дети >140 см',  vnd_fixed: 1000000 },
      { id: 'bana_senior', label: 'Дети 100–140 см / 70+',    vnd_fixed: 800000  },
    ],
  },
  {
    icon: '♨️', name: 'Hot Springs',
    rows: [
      { type: 'price',  label: 'Взрослый',      usd: 72 },
      { type: 'price',  label: 'Ребёнок до 10', usd: 36 },
    ],
    tickets: [
      { id: 'hs_adult', label: 'Взрослые и дети >140 см', vnd_fixed: 500000 },
      { id: 'hs_child', label: 'Дети 100–140 см',         vnd_fixed: 300000 },
    ],
  },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// УТИЛИТЫ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ceilTo = (v, s) => Math.ceil(v / s) * s;

const fmtUSD = n => Math.ceil(n) + ' $';
const fmtRUB  = n => n.toLocaleString('ru-RU') + ' ₽';
const fmtVND  = n => n.toLocaleString('ru-RU') + ' ₫';
const fmtUSDT = n => n + ' USDT';

function calcFromUSD(usd, R) {
  if (!R) return null;
  return {
    rub:  ceilTo(usd * R.RUB  * (1 + MARKUP.RUB),  ROUND_STEP.RUB),
    vnd:  ceilTo(usd * R.VND  * (1 + MARKUP.VND),  ROUND_STEP.VND),
    usdt: ceilTo(usd * R.USDT * (1 + MARKUP.USDT), ROUND_STEP.USDT),
    usd,
  };
}

function calcFromVND(vnd_fixed, R) {
  // Билеты — фиксированы в VND, пересчитываем в остальные через рыночный курс (без наценки)
  if (!R) return { usd: null, rub: null, vnd: vnd_fixed, usdt: null };
  const usd  = vnd_fixed / R.VND;
  return {
    usd:  Math.ceil(usd * 100) / 100,
    rub:  ceilTo(usd * R.RUB,  ROUND_STEP.RUB),
    vnd:  vnd_fixed,
    usdt: ceilTo(usd * R.USDT, ROUND_STEP.USDT),
  };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ЗАГРУЗКА КУРСОВ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function fetchRates() {
  // Источник 1: open.er-api.com (без ключа, CORS открыт)
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD', { mode: 'cors' });
    const d = await r.json();
    if (d.result === 'success') return {
      RUB: d.rates.RUB, VND: d.rates.VND, USDT: 1.0,
      source: 'ExchangeRate-API',
      updated: new Date(d.time_last_update_utc),
    };
  } catch(_) {}

  // Источник 2: Frankfurter (ECB, без ключа)
  try {
    const r = await fetch('https://api.frankfurter.dev/v2/latest?base=USD&symbols=RUB,VND', { mode: 'cors' });
    const d = await r.json();
    if (d.rates) return {
      RUB: d.rates.RUB, VND: d.rates.VND || 25400, USDT: 1.0,
      source: 'Frankfurter (ECB)',
      updated: new Date(d.date),
    };
  } catch(_) {}

  // Резервные курсы (обновляй вручную раз в месяц если оба API недоступны)
  return {
    RUB: 82.5, VND: 25400, USDT: 1.0,
    source: 'Резервные курсы (апрель 2026)',
    updated: new Date('2026-04-17'),
  };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// РЕНДЕР
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function priceRowHTML(label, p, isTicket = false) {
  const lc = isTicket ? 'row-label ticket-label' : 'row-label';
  const tc = isTicket ? 'price-cell ticket' : 'price-cell';
  const usdStr  = p && p.usd  != null ? fmtUSD(p.usd)   : '—';
  const rubStr  = p && p.rub  != null ? fmtRUB(p.rub)   : '—';
  const vndStr  = p && p.vnd  != null ? fmtVND(p.vnd)   : '—';
  const usdtStr = p && p.usdt != null ? fmtUSDT(p.usdt) : '—';
  return `
    <div class="price-row${isTicket ? ' separator' : ''}">
      <div class="${lc}">${label}</div>
      <div class="${tc} usd">${usdStr}</div>
      <div class="${tc} rub">${rubStr}</div>
      <div class="${tc} vnd">${vndStr}</div>
      <div class="${tc} usdt">${usdtStr}</div>
    </div>`;
}

function skeletonRowHTML(isTicket = false) {
  const lc = isTicket ? 'row-label ticket-label' : 'row-label';
  return `
    <div class="price-row${isTicket ? ' separator' : ''}">
      <div class="${lc}"><span class="skeleton" style="width:80px"></span></div>
      <div class="price-cell usd"><span class="skeleton"></span></div>
      <div class="price-cell rub"><span class="skeleton"></span></div>
      <div class="price-cell vnd"><span class="skeleton"></span></div>
      <div class="price-cell usdt"><span class="skeleton"></span></div>
    </div>`;
}

function renderCards(rates, skeleton = false) {
  const container = document.getElementById('price-list');

  const colHeaders = `
    <div class="col-headers">
      <div></div>
      <div class="col-h-usd">USD</div>
      <div class="col-h-rub">RUB</div>
      <div class="col-h-vnd">VND</div>
      <div class="col-h-usdt">USDT</div>
    </div>`;

  const cards = TOURS.map(t => {
    // основные строки
    const mainRows = t.rows.map(r => {
      if (skeleton) return skeletonRowHTML();
      const p = calcFromUSD(r.usd, rates);
      return priceRowHTML(r.label, p);
    }).join('');

    // строки входных билетов
    let ticketRows = '';
    if (t.tickets && t.tickets.length) {
      if (skeleton) {
        ticketRows = `<div class="ticket-section-label">Входные билеты</div><div class="price-rows" style="padding-top:0">` +
          t.tickets.map(() => skeletonRowHTML(true)).join('') + `</div>`;
      } else {
        ticketRows = `<div class="ticket-section-label">Входные билеты</div><div class="price-rows" style="padding-top:0">` +
          t.tickets.map(tk => {
            const p = calcFromVND(tk.vnd_fixed, rates);
            const label = tk.note ? `${tk.label} <span style="color:#bbb">${tk.note}</span>` : tk.label;
            return priceRowHTML(label, p, true);
          }).join('') + `</div>`;
      }
    }

    return `
      <div class="tour-card" data-idx="${TOURS.indexOf(t)}" style="cursor:pointer">
        <div class="tour-header">
          <div class="tour-icon">${t.icon}</div>
          <div class="tour-name">${t.name}</div>
        </div>
        <div class="price-rows">${mainRows}</div>
        ${ticketRows}
        <button class="calc-toggle" data-calc="${TOURS.indexOf(t)}" onclick="event.stopPropagation();this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ Закрыть':'▼ Калькулятор группы'">▼ Калькулятор группы</button>
        ${buildCalc(t, TOURS.indexOf(t))}
      </div>`;
  }).join('');

  container.innerHTML = colHeaders + cards;
}

function updateStatusBar(rates) {
  const badge = document.getElementById('rate-status');
  const txt   = document.getElementById('status-text');
  const upd   = document.getElementById('last-updated');

  if (!rates) {
    badge.className = 'rate-badge error';
    txt.textContent = 'Курсы недоступны';
    document.getElementById('chip-rub').textContent  = '—';
    document.getElementById('chip-vnd').textContent  = '—';
    document.getElementById('chip-usdt').textContent = '—';
    return;
  }

  badge.className = 'rate-badge live';
  txt.textContent = rates.source;

  if (rates.updated instanceof Date && !isNaN(rates.updated)) {
    upd.textContent = rates.updated.toLocaleDateString('ru-RU', {
      day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
    });
  }

  document.getElementById('chip-rub').textContent  =
    Math.round(rates.RUB * 1.15).toLocaleString('ru-RU') + ' ₽';
  document.getElementById('chip-vnd').textContent  =
    Math.round(rates.VND * 1.03).toLocaleString('ru-RU') + ' ₫';
  document.getElementById('chip-usdt').textContent =
    ceilTo(rates.USDT * (1 + MARKUP.USDT), ROUND_STEP.USDT).toFixed(2) + ' USDT';
}


// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// КАЛЬКУЛЯТОР
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildCalc(t, idx) {
  const rows = t.rows.map((r, i) => `
    <div class="calc-row">
      <div class="calc-label">${r.label}</div>
      <div class="calc-counter">
        <button class="calc-btn" data-action="dec" data-tour="${idx}" data-row="${i}">−</button>
        <div class="calc-num" id="cn-${idx}-${i}">0</div>
        <button class="calc-btn" data-action="inc" data-tour="${idx}" data-row="${i}">+</button>
      </div>
    </div>`).join('');

  const ticketRows = t.tickets ? t.tickets.map((tk, i) => `
    <div class="calc-row">
      <div class="calc-label" style="font-style:italic">${tk.label}</div>
      <div class="calc-counter">
        <button class="calc-btn" data-action="dec" data-tour="${idx}" data-ticket="${i}">−</button>
        <div class="calc-num" id="ct-${idx}-${i}">0</div>
        <button class="calc-btn" data-action="inc" data-tour="${idx}" data-ticket="${i}">+</button>
      </div>
    </div>`).join('') : '';

  return `
    <div class="calc-block" id="calc-${idx}">
      ${rows}
      ${ticketRows ? '<div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;font-family:DM Mono,monospace;padding-bottom:4px">Входные билеты</div>' + ticketRows : ''}
      <div class="calc-total" id="calc-total-${idx}" style="display:none">
        <div class="calc-total-label">Итого</div>
        <div class="calc-total-usd" id="calc-usd-${idx}"></div>
        <div class="calc-total-rest" id="calc-rest-${idx}"></div>
        <div class="calc-currencies">
          <label><input type="checkbox" class="cur-check" data-tour="${idx}" value="usd" checked> USD</label>
          <label><input type="checkbox" class="cur-check" data-tour="${idx}" value="rub"> RUB</label>
          <label><input type="checkbox" class="cur-check" data-tour="${idx}" value="vnd"> VND</label>
          <label><input type="checkbox" class="cur-check" data-tour="${idx}" value="usdt"> USDT</label>
        </div>
        <div class="calc-currencies">
          <label><input type="checkbox" class="cur-check" data-tour="${idx}" value="usd" checked> USD</label>
          <label><input type="checkbox" class="cur-check" data-tour="${idx}" value="rub"> RUB</label>
          <label><input type="checkbox" class="cur-check" data-tour="${idx}" value="vnd"> VND</label>
          <label><input type="checkbox" class="cur-check" data-tour="${idx}" value="usdt"> USDT</label>
        </div>
        <button class="calc-copy" data-tour="${idx}">Скопировать расчёт</button>
      </div>
    </div>`;
}

const calcCounts = {};

function getCurChecked(idx) {
  const checks = document.querySelectorAll('.cur-check[data-tour="' + idx + '"]:checked');
  return Array.from(checks).map(function(c) { return c.value; });
}

function formatPrice(usd, rub, vnd, usdt, curs) {
  const parts = [];
  if (curs.indexOf('usd')  >= 0) parts.push(Math.ceil(usd) + ' $');
  if (curs.indexOf('rub')  >= 0) parts.push(fmtRUB(ceilTo(rub, 100)));
  if (curs.indexOf('vnd')  >= 0) parts.push(fmtVND(ceilTo(vnd, 100000)));
  if (curs.indexOf('usdt') >= 0) parts.push(Math.ceil(usdt) + ' USDT');
  return parts.join(' / ');
}

function updateCalc(idx) {
  const t = TOURS[idx];
  if (!t || !currentRates) return;
  const R = currentRates;

  let totalUSD = 0, totalRUB = 0, totalVND = 0, totalUSDT = 0;
  let hasAny = false;
  const rowData = [];
  const ticketData = [];

  t.rows.forEach((r, i) => {
    const n = (calcCounts[idx] && calcCounts[idx]['r'+i]) || 0;
    if (n === 0) return;
    hasAny = true;
    const p = calcFromUSD(r.usd, R);
    totalUSD  += Math.ceil(r.usd) * n;
    totalRUB  += p.rub * n;
    totalVND  += p.vnd * n;
    totalUSDT += p.usdt * n;
    rowData.push({ label: r.label, n, usd: Math.ceil(r.usd)*n, rub: p.rub*n, vnd: p.vnd*n, usdt: p.usdt*n });
  });

  if (t.tickets) {
    t.tickets.forEach((tk, i) => {
      const n = (calcCounts[idx] && calcCounts[idx]['t'+i]) || 0;
      if (n === 0) return;
      hasAny = true;
      const p = calcFromVND(tk.vnd_fixed, R);
      totalUSD  += p.usd * n;
      totalRUB  += p.rub * n;
      totalVND  += tk.vnd_fixed * n;
      totalUSDT += p.usdt * n;
      ticketData.push({ label: tk.label, n, usd: p.usd*n, rub: p.rub*n, vnd: tk.vnd_fixed*n, usdt: p.usdt*n });
    });
  }

  const totalEl = document.getElementById('calc-total-' + idx);
  if (!hasAny) { totalEl.style.display = 'none'; return; }
  totalEl.style.display = 'block';

  const curs = getCurChecked(idx);
  const totalStr = formatPrice(totalUSD, totalRUB, totalVND, totalUSDT, curs);
  document.getElementById('calc-usd-' + idx).textContent = totalStr || '—';
  document.getElementById('calc-rest-' + idx).textContent = '';

  const copyBtn = totalEl.querySelector('.calc-copy');
  copyBtn.dataset.rows = JSON.stringify(rowData);
  copyBtn.dataset.tickets = JSON.stringify(ticketData);
  copyBtn.dataset.usd = totalUSD;
  copyBtn.dataset.rub = totalRUB;
  copyBtn.dataset.vnd = totalVND;
  copyBtn.dataset.usdt = totalUSDT;
  copyBtn.dataset.tour = idx;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(async () => {
  renderCards(null, true);
  const rates = await fetchRates();
  currentRates = rates;
  updateStatusBar(rates);
  renderCards(rates, false);

  document.getElementById('price-list').addEventListener('click', function(e) {
    var card = e.target.closest('[data-idx]');
    if (!card || !currentRates) return;
    var t = TOURS[+card.dataset.idx];
    if (!t) return;
    var text = t.icon + ' ' + t.name + '\n──────────────\n';
    t.rows.forEach(function(r) {
      var p = calcFromUSD(r.usd, currentRates);
      text += r.label + ':  ' + Math.ceil(r.usd) + ' $ / ' + fmtRUB(p.rub) + ' / ' + fmtVND(p.vnd) + ' / ' + fmtUSDT(p.usdt) + '\n';
    });
    if (t.tickets) {
      text += '\nВходные билеты:\n';
      t.tickets.forEach(function(tk) {
        var p = calcFromVND(tk.vnd_fixed, currentRates);
        text += tk.label + ':  ' + fmtUSD(p.usd) + ' / ' + fmtRUB(p.rub) + ' / ' + fmtVND(p.vnd) + ' / ' + fmtUSDT(p.usdt) + '\n';
      });
    }
    navigator.clipboard.writeText(text.trim()).then(function() {
      var el = document.getElementById('ct');
      if (!el) { el = document.createElement('div'); el.id = 'ct'; el.style = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1917;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;z-index:9999;pointer-events:none'; el.textContent = '✓ Скопировано'; document.body.appendChild(el); }
      el.style.opacity = '1'; clearTimeout(el._x); el._x = setTimeout(function(){el.style.opacity='0'},1800);
    });
  });
  // Calc counter buttons
  document.getElementById('price-list').addEventListener('click', function(e) {
    const btn = e.target.closest('.calc-btn');
    if (!btn) return;
    e.stopPropagation();
    const idx = +btn.dataset.tour;
    if (!calcCounts[idx]) calcCounts[idx] = {};
    const key = btn.dataset.row !== undefined ? 'r'+btn.dataset.row : 't'+btn.dataset.ticket;
    const numEl = btn.dataset.row !== undefined
      ? document.getElementById('cn-'+idx+'-'+btn.dataset.row)
      : document.getElementById('ct-'+idx+'-'+btn.dataset.ticket);
    let val = parseInt(numEl.textContent) || 0;
    if (btn.dataset.action === 'inc') val++;
    else if (val > 0) val--;
    numEl.textContent = val;
    calcCounts[idx][key] = val;
    updateCalc(idx);
  });

  // Calc copy button
  document.getElementById('price-list').addEventListener('click', function(e) {
    const btn = e.target.closest('.calc-copy');
    if (!btn) return;
    e.stopPropagation();
    const idx = +btn.dataset.tour;
    const t = TOURS[idx];
    const curs = getCurChecked(idx);
    const rows = JSON.parse(btn.dataset.rows || '[]');
    const tickets = JSON.parse(btn.dataset.tickets || '[]');
    const totalUSD = +btn.dataset.usd;
    const totalRUB = +btn.dataset.rub;
    const totalVND = +btn.dataset.vnd;
    const totalUSDT = +btn.dataset.usdt;

    let text = t.icon + ' ' + t.name + '\n\n';
    rows.forEach(function(r) {
      text += r.label + ' × ' + r.n + ' — ' + formatPrice(r.usd, r.rub, r.vnd, r.usdt, curs) + '\n';
    });
    if (tickets.length) {
      text += '\nВходные билеты:\n';
      tickets.forEach(function(tk) {
        text += tk.label + ' × ' + tk.n + ' — ' + formatPrice(tk.usd, tk.rub, tk.vnd, tk.usdt, curs) + '\n';
      });
    }
    text += '\nИтого: ' + formatPrice(totalUSD, totalRUB, totalVND, totalUSDT, curs);

    navigator.clipboard.writeText(text.trim()).then(function() {
      var el = document.getElementById('ct');
      if (!el) { el = document.createElement('div'); el.id = 'ct'; el.style = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1917;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;z-index:9999;pointer-events:none'; el.textContent = '✓ Скопировано'; document.body.appendChild(el); }
      el.style.opacity = '1'; clearTimeout(el._x); el._x = setTimeout(function(){el.style.opacity='0'},1800);
    });
  });

  // Currency checkbox change
  document.getElementById('price-list').addEventListener('change', function(e) {
    const cb = e.target.closest('.cur-check');
    if (!cb) return;
    updateCalc(+cb.dataset.tour);
  });
})();
</script>
</body>
</html>
